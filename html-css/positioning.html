<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Positioning</title>
    <style>
      * {
        padding: 0;
        margin: 0;
      }

      body {
        background-color: tomato;
      }

      .container {
        border: 1px solid white;
        height: 600px;
        width: 800px;
        margin: 100px auto;
        position: relative;
      }

      .box {
        background-color: dodgerblue;
        color: white;
        border: 1px solid black;
        padding: 10px;
      }

      .box:nth-child(1) {
        position: sticky;
        border-color: red;
        top: 20px;
      }

      .mySpan {
        display: block;
        position: fixed;
        bottom: 20px;
        left: 20px;
        background-color: dodgerblue;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">Box1 extra ciontent</div>
      <div class="box">Box2</div>
      <div class="box">Box3</div>
      <span class="mySpan">Click Me</span>
    </div>
  </body>
</html>
