<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .inactive {
        background-color: gray;
      }

      .active {
        background-color: greenyellow;
      }
    </style>
  </head>
  <body>
    <button id="btn-1" class="inactive">Click Me</button>
    <script>
      // On click of the button change the button to active and vice versa.
      let myBtn = document.querySelector(".inactive");
      myBtn.addEventListener("click", function (event) {
        if (myBtn.classList.contains("inactive")) {
          myBtn.classList.remove("inactive");
          myBtn.classList.add("active");
          myBtn.innerHTML = "I am Active";
        } else {
          myBtn.classList.remove("active");
          myBtn.classList.add("inactive");
          myBtn.innerHTML = "I am In-Active";
        }
      });
    </script>
  </body>
</html>
