<!-- boilerplate code -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <ul>
      <li>1</li>
      <li>2</li>
      <li>3</li>
      <li>4</li>
      <li>5</li>
      <li>6</li>

      <li>8</li>
      <li>9</li>
      <li>10</li>
    </ul>
    <button id="fixBtn">Fix List</button>
    <script>
      // Fix the list by inserting the missing element using querySelectorAll and insertBefore

      let button = document.getElementById("fixBtn");
      button.addEventListener("click", function () {
        let ulList = document.querySelector("ul");
        let myList = document.querySelectorAll("li");
        console.log(myList);

        let indexWith6 = myList[6];

        // Create the element required
        let myElem = document.createElement("li");
        myElem.innerText = "7";

        ulList.insertBefore(myElem, indexWith6);
      });
    </script>
  </body>
</html>
