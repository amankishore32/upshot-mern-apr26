<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- Navigation Bar -->
    <div class="toolbox-cont">
      <!-- Branding -->
      <div class="brand-section">
        <i class="fa-brands fa-square-dribbble"></i>
        <h1>TaskFlow</h1>
      </div>
      <!-- Priority Filter -->
      <div class="toolbox-priority-cont">
        <span class="filter-label">Priority Filters: </span>
        <div class="color-filters">
          <div class="lightpink color"></div>
          <div class="lightgreen color"></div>
          <div class="lightblue color"></div>
          <div class="black color"></div>
        </div>
      </div>
      <!-- CTAs -->
      <div class="action-btn-cont">
        <div class="add-btn">
          <i class="fa-solid fa-plus"></i>
          <span class="btn-text">Add Task</span>
        </div>
        <div class="remove-btn">
          <i class="fa-solid fa-trash"></i>
          <span class="btn-text">Delete</span>
        </div>
      </div>
    </div>
    <!-- Main Content -->
    <div class="main-cont"></div>

    <!-- Modal -->
    <div class="modal-cont">
      <!-- Heading Content -->
      <div class="modal-header">
        <h2>Create New Task</h2>
        <p>Enter your task details and select a priority level</p>
      </div>
      <!-- User Input Area -->
      <div class="textArea-cont">
        <textarea
          name=""
          id=""
          placeholder="Enter your task description..."
        ></textarea>
      </div>
      <!-- Priority Selectors -->
      <div class="priority-color-cont"></div>
    </div>
  </body>
</html>
