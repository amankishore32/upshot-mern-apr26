<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unthrottled Scroll Example</title>
    <style>
      body,
      html {
        height: 3000px; /* Ensure there's enough space to scroll */
      }
      .status {
        position: fixed;
        top: 0;
        left: 0;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div class="status">
      Scroll position: <span id="scrollPosition">0</span>
    </div>

    <script>
      let latScrollTime = 0;
      function updateScrollPOsition() {
        let now = new Date().getTime();
        if (now - latScrollTime > 500) {
          document.getElementById("scrollPosition").textContent =
            window.scrollY;
          console.log("Scrolled");
          latScrollTime = now;
        }
      }
      window.addEventListener("scroll", updateScrollPOsition);
    </script>
  </body>
</html>
